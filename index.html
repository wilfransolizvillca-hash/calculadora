<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Científica SOLIZ High-Tech</title>
    <style>
        /* Importar una fuente gótica estilizada */
        @import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap');

        /* Estilos base */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle, #080f1e 0%, #020408 100%);
            color: #00f0ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* PANTALLA DE CARGA DE BIENVENIDA */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #020408;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .welcome-title {
            font-size: 2.5rem;
            color: #ffd700;
            font-family: 'Segoe UI', sans-serif;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            text-align: center;
            padding: 0 20px;
        }

        .loader-container {
            width: 250px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(218, 165, 32, 0.3);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.1);
        }

        .loader-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #b8860b, #ffd700);
            box-shadow: 0 0 15px #ffd700;
            border-radius: 10px;
            animation: loadProgress 5s linear forwards;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* FONDO DE PANTALLA: SOLIZ GÓTICO DORADO (ELEMENTO SUTIL) */
        .background-brand-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 16vw;
            color: rgba(218, 165, 32, 0.08); /* Dorado sutil */
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.15);
            user-select: none;
            z-index: -2;
            white-space: nowrap;
        }

        /* Cuadrícula tecnológica de fondo */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(218, 165, 32, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(218, 165, 32, 0.015) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        /* Contenedor principal de la calculadora */
        .calc-container {
            background: rgba(10, 16, 26, 0.9);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(218, 165, 32, 0.1), inset 0 0 20px rgba(0, 240, 255, 0.02);
            border: 1px solid rgba(218, 165, 32, 0.25);
            backdrop-filter: blur(12px);
            width: 360px;
            box-sizing: border-box;
            position: relative;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        /* Clase para mostrar la calculadora suavemente tras la carga */
        .calc-container.show {
            opacity: 1;
            transform: scale(1);
        }

        /* ENCABEZADO DE LA CALCULADORA: SOLIZ */
        .calc-header {
            font-family: 'UnifrakturMaguntia', cursive;
            color: #ffd700; /* Dorado brillante */
            text-align: center;
            margin: 0 0 15px 0;
            font-size: 2.8rem;
            letter-spacing: 2px;
            text-shadow: 0 0 12px rgba(255, 215, 0, 0.5);
            user-select: none;
        }

        /* Pantalla de visualización */
        .screen-container {
            margin-bottom: 20px;
            background: #03070f;
            border: 1px solid rgba(218, 165, 32, 0.3);
            border-radius: 12px;
            padding: 12px;
            box-sizing: border-box;
            box-shadow: inset 0 0 10px rgba(218, 165, 32, 0.1);
        }

        .operation-history {
            color: rgba(218, 165, 32, 0.4);
            font-size: 0.9rem;
            text-align: right;
            min-height: 18px;
        }

        .main-display {
            width: 100%;
            background: transparent;
            border: none;
            color: #ffd700;
            font-size: 2.2rem;
            text-align: right;
            box-sizing: border-box;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            outline: none;
            font-family: monospace;
        }

        /* Rejilla de botones */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        button {
            padding: 15px 5px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            background: rgba(25, 35, 50, 0.7);
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(218, 165, 32, 0.1);
        }

        button:hover {
            background: rgba(255, 215, 0, 0.1);
            color: #ffd700;
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.2);
            transform: translateY(-1px);
        }

        .scientific { background: rgba(18, 28, 45, 0.8); color: #38bdf8; }
        .operator { color: #ff9e00; }
        .clear-btn { color: #ff4a4a; }
        
        /* Botón de ejecución (=) en oro brillante */
        .equal { 
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%); 
            color: #040814; 
            font-weight: bold; 
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .equal:hover {
            background: #ffd700;
            box-shadow: 0 0 18px #ffd700;
        }

        /* Estilos de la Bóveda Secreta */
        .vault-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 380px;
            background: rgba(5, 9, 16, 0.98);
            border: 2px solid #ffd700;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.35);
            border-radius: 20px;
            padding: 25px;
            z-index: 100;
            backdrop-filter: blur(20px);
            box-sizing: border-box;
        }

        .vault-header {
            font-family: 'UnifrakturMaguntia', cursive;
            color: #ffd700;
            text-align: center;
            margin-top: 0;
            text-shadow: 0 0 12px rgba(255, 215, 0, 0.6);
            font-size: 2.2rem;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
            padding-bottom: 8px;
            letter-spacing: 1px;
        }

        /* Sección de escaneo automatizado */
        .scan-section {
            margin-top: 15px;
            text-align: center;
        }

        .btn-scan {
            width: 100%;
            background: rgba(255, 215, 0, 0.1);
            color: #ffd700;
            border: 1px solid #ffd700;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-scan:hover {
            background: #ffd700;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .status-scan {
            display: none;
            color: #ffd700;
            font-size: 0.85rem;
            margin-top: 8px;
            font-family: monospace;
            animation: blink 1s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* Formulario para agregar apps manuales */
        .add-app-manual {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .add-app-manual input {
            flex: 1;
            padding: 11px;
            background: #090f1a;
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            color: #ffffff;
            outline: none;
            font-size: 0.9rem;
        }

        .add-app-manual input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
        }

        .btn-add-system {
            background: rgba(255, 215, 0, 0.15);
            color: #ffd700;
            border: 1px solid #ffd700;
            padding: 0 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-add-system:hover { background: #ffd700; color: #000; box-shadow: 0 0 10px #ffd700; }

        /* Lista de aplicaciones */
        .app-list {
            margin-top: 20px;
            max-height: 230px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .app-list::-webkit-scrollbar { width: 4px; }
        .app-list::-webkit-scrollbar-thumb { background: #ffd700; border-radius: 10px; }

        .app-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }

        .app-name { color: #ffffff; font-size: 0.95rem; }

        .action-buttons {
            display: flex;
            gap: 6px;
        }

        .btn-open {
            background: #10b981;
            color: white;
            font-size: 0.8rem;
            padding: 6px 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-open:hover { background: #059669; }

        .btn-remove {
            background: #ef4444;
            color: white;
            font-size: 0.8rem;
            padding: 6px 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }
        .btn-remove:hover { background: #dc2626; }

        .btn-close { width: 100%; background: #27272a; margin-top: 15px; font-size: 0.95rem; padding: 10px; color: white; border: none; border-radius: 8px; cursor: pointer;}
        .btn-close:hover { background: #3f3f46; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-title">BIENVENIDO A WILFRAN :)</div>
        <div class="loader-container">
            <div class="loader-bar"></div>
        </div>
    </div>

    <div class="background-brand-watermark">SOLIZ</div>

    <div class="calc-container" id="calcContainer">
        <h1 class="calc-header">SOLIZ</h1>

        <div class="screen-container">
            <div class="operation-history" id="history"></div>
            <input type="text" class="main-display" id="display" readonly value="0">
        </div>
        
        <div class="buttons-grid">
            <button class="scientific" onclick="scientificCmd('sin')">sin</button>
            <button class="scientific" onclick="scientificCmd('cos')">cos</button>
            <button class="scientific" onclick="scientificCmd('tan')">tan</button>
            <button class="scientific" onclick="scientificCmd('π')">π</button>
            <button class="scientific" onclick="scientificCmd('e')">e</button>

            <button class="scientific" onclick="scientificCmd('sqrt')">√</button>
            <button class="scientific" onclick="scientificCmd('pow')">x^y</button>
            <button class="scientific" onclick="scientificCmd('log')">log</button>
            <button class="scientific" onclick="scientificCmd('ln')">ln</button>
            <button class="scientific" onclick="scientificCmd('fact')">x!</button>

            <button class="clear-btn" onclick="clearAll()">CE</button>
            <button class="clear-btn" onclick="deleteLast()">DEL</button>
            <button onclick="appendValue('(')">(</button>
            <button onclick="appendValue(')')">)</button>
            <button class="operator" onclick="appendValue('/')">/</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('*')">×</button>
            <button class="operator" onclick="scientificCmd('square')">x²</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('-')">-</button>
            <button class="operator" onclick="appendValue('%')">%</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('+')">+</button>
            <button class="equal" onclick="execute()">=</button>

            <button onclick="appendValue('0')" style="grid-column: span 2;">0</button>
            <button onclick="appendValue('.')">.</button>
            <button onclick="scientificCmd('exp')" class="scientific">EXP</button>
        </div>
    </div>

    <div class="vault-modal" id="vaultMenu">
        <h2 class="vault-header">SOLIZ Vault</h2>
        
        <div class="scan-section">
            <button class="btn-scan" id="scanBtn" onclick="autoSincronizarApps()">🔄 Sincronizar Apps Simuladas</button>
            <div class="status-scan" id="scanStatus">CONECTANDO AL DISPOSITIVO...</div>
        </div>

        <div class="add-app-manual">
            <input type="text" id="manualAppName" placeholder="Nombre de la app (ej. WhatsApp)">
            <button class="btn-add-system" onclick="addCustomApp()">Añadir</button>
        </div>

        <div class="app-list" id="vaultAppList">
            <p id="emptyMessage" style="text-align:center; color:#71717a; font-size:0.9rem;">No hay aplicaciones en el aislamiento de SOLIZ.</p>
        </div>
        
        <button class="btn-close" onclick="toggleVault(false)">Cerrar Sistema</button>
    </div>

    <script>
        const display = document.getElementById('display');
        const history = document.getElementById('history');
        const vaultMenu = document.getElementById('vaultMenu');
        const welcomeScreen = document.getElementById('welcome-screen');
        const calcContainer = document.getElementById('calcContainer');
        let isResetPending = false; 

        // MANEJO DEL SCREEN DE BIENVENIDA (5 SEGUNDOS)
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                // Desvanecer pantalla de carga
                welcomeScreen.style.opacity = '0';
                welcomeScreen.style.visibility = 'hidden';
                // Mostrar la calculadora suavemente
                calcContainer.classList.add('show');
            }, 5000); // 5000 milisegundos = 5 segundos
        });

        function appendValue(val) {
            if (display.value === '0' || isResetPending) {
                display.value = val;
                isResetPending = false;
            } else {
                display.value += val;
            }
        }

        function clearAll() { display.value = '0'; history.innerText = ''; }
        function deleteLast() {
            if (display.value.length > 1) display.value = display.value.slice(0, -1);
            else display.value = '0';
        }

        function scientificCmd(type) {
            let current = parseFloat(display.value);
            if (isNaN(current) && type !== 'π' && type !== 'e') return;
            switch(type) {
                case 'sin': display.value = Math.sin(current * Math.PI / 180).toFixed(6); break;
                case 'cos': display.value = Math.cos(current * Math.PI / 180).toFixed(6); break;
                case 'tan': display.value = Math.tan(current * Math.PI / 180).toFixed(6); break;
                case 'π': appendValue(Math.PI.toFixed(6)); break;
                case 'e': appendValue(Math.E.toFixed(6)); break;
                case 'sqrt': display.value = Math.sqrt(current); break;
                case 'square': display.value = Math.pow(current, 2); break;
                case 'pow': appendValue('**'); break;
                case 'log': display.value = Math.log10(current); break;
                case 'ln': display.value = Math.log(current); break;
                case 'exp': appendValue('*10**'); break;
                case 'fact': display.value = factorial(current); break;
            }
            isResetPending = true;
        }

        function factorial(n) {
            if (n < 0) return 'Error';
            if (n === 0 || n === 1) return 1;
            let r = 1; for (let i = 2; i <= n; i++) r *= i; return r;
        }

        function execute() {
            // CLAVE SECRETA ACTIVADORA: 2006
            if (display.value === '2006') { toggleVault(true); clearAll(); return; }
            try {
                if (display.value) {
                    history.innerText = display.value + ' =';
                    display.value = eval(display.value.replace(/%/g, '/100'));
                    isResetPending = true;
                }
            } catch (err) { display.value = 'Error'; setTimeout(clearAll, 1500); }
        }

        // CONTROL DE LA BÓVEDA
        function toggleVault(show) { vaultMenu.style.display = show ? 'block' : 'none'; }

        // SINCRONIZACIÓN AUTOMATIZADA SIMULADA DE APPS DEL CELULAR
        function autoSincronizarApps() {
            const btn = document.getElementById('scanBtn');
            const status = document.getElementById('scanStatus');
            const container = document.getElementById('vaultAppList');

            btn.disabled = true;
            status.style.display = 'block';
            status.innerText = "ACCEDIENDO A COMPONENTES DEL DISPOSITIVO...";

            const appsCelular = [
                { name: "💬 WhatsApp", url: "https://web.whatsapp.com" },
                { name: "📸 Instagram", url: "https://www.instagram.com" },
                { name: "🎵 TikTok", url: "https://www.tiktok.com" },
                { name: "🔥 Tinder", url: "https://tinder.com" },
                { name: "📘 Facebook", url: "https://m.facebook.com" },
                { name: "📩 Gmail", url: "https://mail.google.com" }
            ];

            setTimeout(() => {
                status.innerText = "CONFIGURANDO CLONES DE AISLAMIENTO...";
                
                setTimeout(() => {
                    status.style.display = 'none';
                    btn.disabled = false;
                    container.innerHTML = ''; 

                    appsCelular.forEach((app, index) => {
                        createAppItem(container, app.name, app.url, 'auto-app-' + index);
                    });
                }, 1000);
            }, 1000);
        }

        // AGREGAR APP MANUALMENTE
        function addCustomApp() {
            const input = document.getElementById('manualAppName');
            const name = input.value.trim();
            if (!name) { alert("Por favor introduce el nombre de una app."); return; }

            const container = document.getElementById('vaultAppList');
            const emptyMsg = document.getElementById('emptyMessage');
            if (emptyMsg) emptyMsg.remove();

            let targetUrl = `https://www.google.com/search?q=${encodeURIComponent(name)}`;
            if(name.toLowerCase().includes('whatsapp')) targetUrl = "https://web.whatsapp.com";
            if(name.toLowerCase().includes('instagram')) targetUrl = "https://www.instagram.com";

            createAppItem(container, "📱 " + name, targetUrl, 'custom-app-' + Date.now());
            input.value = '';
        }

        // FUNCIÓN AUXILIAR PARA CREAR LOS ELEMENTOS DE LA LISTA
        function createAppItem(container, name, url, id) {
            const item = document.createElement('div');
            item.className = 'app-item';
            item.id = id;
            item.innerHTML = `
                <span class="app-name">${name}</span>
                <div class="action-buttons">
                    <button class="btn-open" onclick="window.open('${url}', '_blank')">Abrir</button>
                    <button class="btn-remove" onclick="destroyApp('${id}')">Quitar</button>
                </div>
            `;
            container.appendChild(item);
        }

        function destroyApp(elementId) {
            const appRow = document.getElementById(elementId);
            if (appRow) {
                appRow.remove();
                const container = document.getElementById('vaultAppList');
                if (container.children.length === 0) {
                    container.innerHTML = '<p id="emptyMessage" style="text-align:center; color:#71717a; font-size:0.9rem;">No hay aplicaciones en el aislamiento de SOLIZ.</p>';
                }
            }
        }
    </script>
</body>
</html>
